<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Para Você com Amor 💖</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;700&family=Montserrat:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="cursor-glow" id="cursorGlow"></div>
  <div class="particles" id="particles"></div>
  <div class="gallery-container" id="galleryContainer"></div>


  <div class="photo-counter" id="photoCounter"></div>


  <div class="floating-controls">
    <button class="control-btn" id="btnPrevPhoto" title="Foto anterior">❮</button>
    <button class="control-btn" id="btnPlayPause" title="Play/Pausa galeria">⏸️</button>
    <button class="control-btn" id="btnNextPhoto" title="Próxima foto">❯</button>
  </div>


  <div class="content-bottom">
    <h1>Para a mais bela de todas as mulheres! 💕</h1>
    <p>Eu amo você de todas as formas possíveis 💖</p>

    <div class="button-group">
      <button id="btnMensagem">💌 Nova Mensagem</button>
      <button id="btnMusica">🎵 Reproduzir</button>
    </div>
  </div>


  <audio id="musicaFundo" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3" type="audio/mpeg">
    Seu navegador não suporta áudio.
  </audio>

  <script src="script.js"></script>
</body>

</html>
